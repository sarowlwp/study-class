{% extends "base.html" %}
{% block title %}Azure Speech 测试{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-6">
  <a href="/raz" class="text-blue-500 hover:underline text-sm">← 返回 RAZ</a>

  <div class="mt-4 bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-2">🎤 Azure Speech 发音测试</h1>
    <p class="text-sm text-gray-500 mb-4">录制你的声音，测试 Azure 语音识别和发音评估</p>

    <!-- 参考文本输入 -->
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">参考文本（英文）</label>
      <textarea id="reference-text" rows="2" class="w-full border rounded-lg p-3 text-gray-800"
        placeholder="输入要朗读的英文句子...">Hello world</textarea>
    </div>

    <!-- 录音按钮 -->
    <div class="flex gap-3 justify-center mb-4">
      <button id="btn-record" onclick="toggleRecord()"
              class="bg-red-500 hover:bg-red-600 text-white font-semibold px-6 py-3 rounded-lg flex items-center gap-2 transition">
        🎤 开始录音
      </button>
    </div>

    <!-- 录音状态 -->
    <div id="recording-indicator" class="hidden text-center mb-4">
      <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-800">
        <span class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-pulse"></span>
        正在录音...
      </span>
    </div>

    <!-- 播放录音 -->
    <div id="playback-area" class="hidden mb-4 text-center">
      <p class="text-sm text-gray-500 mb-2">录音回放：</p>
      <audio id="playback-audio" controls class="w-full"></audio>
    </div>

    <!-- 评分结果 -->
    <div id="result-area" class="hidden bg-gray-50 rounded-lg p-4">
      <div class="text-center mb-4">
        <div id="score-display" class="text-4xl font-bold mb-1"></div>
        <div id="level-display" class="text-lg font-medium"></div>
        <div id="feedback-display" class="text-gray-600 mt-2"></div>
      </div>

      <!-- 单词评分 -->
      <div id="word-scores" class="border-t pt-4">
        <p class="text-sm font-medium text-gray-700 mb-2">单词评分：</p>
        <div id="word-list" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-area" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 text-center">
      <p class="text-red-600 font-medium">评分失败</p>
      <p id="error-message" class="text-red-500 text-sm mt-1"></p>
    </div>

    <!-- 配置信息 -->
    <div class="mt-6 border-t pt-4 text-xs text-gray-400">
      <p>配置: SPEECH_ASSESSOR = {{ assessor_type }}</p>
      <p>评估器: {{ assessor_class }}</p>
    </div>
  </div>
</div>

<script>
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recordedBlob = null;

async function toggleRecord() {
  if (isRecording) {
    stopRecord();
  } else {
    await startRecord();
  }
}

async function startRecord() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // 尝试使用 WAV 格式，如果不支持则回退到 WebM
    const mimeType = MediaRecorder.isTypeSupported('audio/wav')
      ? 'audio/wav'
      : (MediaRecorder.isTypeSupported('audio/webm')
          ? 'audio/webm'
          : 'audio/ogg');

    mediaRecorder = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      // 如果录制的是 WebM，转换为 WAV
      if (mimeType === 'audio/webm') {
        recordedBlob = await convertWebmToWav(new Blob(audioChunks, { type: mimeType }));
      } else {
        recordedBlob = new Blob(audioChunks, { type: mimeType });
      }
      const audioUrl = URL.createObjectURL(recordedBlob);
      document.getElementById('playback-audio').src = audioUrl;
      document.getElementById('playback-area').classList.remove('hidden');
      submitAudio();
    };

    mediaRecorder.start();
    isRecording = true;

    // 更新 UI
    document.getElementById('btn-record').textContent = '⏹ 停止录音';
    document.getElementById('btn-record').classList.replace('bg-red-500', 'bg-orange-500');
    document.getElementById('recording-indicator').classList.remove('hidden');
    document.getElementById('result-area').classList.add('hidden');
    document.getElementById('error-area').classList.add('hidden');
    document.getElementById('playback-area').classList.add('hidden');

  } catch (e) {
    alert('无法获取麦克风权限: ' + e.message);
  }
}

function stopRecord() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    isRecording = false;

    document.getElementById('btn-record').textContent = '⏳ 评分中...';
    document.getElementById('btn-record').disabled = true;
    document.getElementById('recording-indicator').classList.add('hidden');
  }
}

async function submitAudio() {
  const text = document.getElementById('reference-text').value.trim();
  if (!text) {
    alert('请输入参考文本');
    resetButton();
    return;
  }

  const fd = new FormData();
  fd.append('audio', recordedBlob, 'recording.webm');
  fd.append('text', text);
  fd.append('book_id', 'test');
  fd.append('book_title', 'Azure Test');
  fd.append('level', 'test');
  fd.append('page', '1');

  try {
    const res = await fetch('/api/raz/assess', { method: 'POST', body: fd });
    const data = await res.json();

    if (res.ok) {
      showResult(data);
    } else {
      showError(data.detail || '评分失败');
    }
  } catch (e) {
    showError('网络错误: ' + e.message);
  }

  resetButton();
}

function showResult(data) {
  document.getElementById('result-area').classList.remove('hidden');

  // 总分
  const scoreEl = document.getElementById('score-display');
  scoreEl.textContent = data.score + ' 分';

  // 根据等级设置颜色
  const level = data.level || '';
  if (level === 'excellent') {
    scoreEl.className = 'text-4xl font-bold mb-1 text-green-600';
  } else if (level === 'great') {
    scoreEl.className = 'text-4xl font-bold mb-1 text-blue-500';
  } else if (level === 'good') {
    scoreEl.className = 'text-4xl font-bold mb-1 text-yellow-500';
  } else {
    scoreEl.className = 'text-4xl font-bold mb-1 text-red-500';
  }

  // 等级
  const levelNames = {
    'excellent': '非常棒 🌟🌟',
    'great': '很好 🌟',
    'good': '不错 👍',
    'keep_trying': '继续加油 💪'
  };
  document.getElementById('level-display').textContent = levelNames[level] || '';
  document.getElementById('level-display').className = 'text-lg font-medium ' + scoreEl.className.replace('text-4xl font-bold mb-1 ', '');

  // 反馈
  document.getElementById('feedback-display').textContent = data.feedback || '';

  // 单词评分
  const wordList = document.getElementById('word-list');
  wordList.innerHTML = '';

  if (data.word_scores && data.word_scores.length > 0) {
    data.word_scores.forEach(ws => {
      const span = document.createElement('span');
      const isGood = ws.status === 'good';
      span.className = `inline-flex items-center px-2 py-1 rounded text-sm ${
        isGood
          ? 'bg-green-100 text-green-800 border border-green-200'
          : 'bg-red-100 text-red-800 border border-red-200'
      }`;
      span.innerHTML = `${ws.word} <span class="ml-1 font-bold">${ws.score}</span>${isGood ? '✓' : '✗'}`;
      wordList.appendChild(span);
    });
  } else {
    wordList.innerHTML = '<span class="text-gray-400 text-sm">未返回单词级评分</span>';
  }
}

function showError(message) {
  document.getElementById('error-area').classList.remove('hidden');
  document.getElementById('error-message').textContent = message;
}

function resetButton() {
  document.getElementById('btn-record').textContent = '🎤 开始录音';
  document.getElementById('btn-record').disabled = false;
  document.getElementById('btn-record').classList.replace('bg-orange-500', 'bg-red-500');
}

// WebM 转 WAV 函数
async function convertWebmToWav(webmBlob) {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const arrayBuffer = await webmBlob.arrayBuffer();
  const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

  // 转换为单声道 16kHz (Azure 推荐格式)
  const targetSampleRate = 16000;
  const numberOfChannels = 1;
  const offlineContext = new OfflineAudioContext(numberOfChannels, audioBuffer.duration * targetSampleRate, targetSampleRate);
  const source = offlineContext.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(offlineContext.destination);
  source.start();

  const renderedBuffer = await offlineContext.startRendering();
  return audioBufferToWav(renderedBuffer);
}

// AudioBuffer 转 WAV Blob
function audioBufferToWav(audioBuffer) {
  const numberOfChannels = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const format = 1; // PCM
  const bitDepth = 16;

  const bytesPerSample = bitDepth / 8;
  const blockAlign = numberOfChannels * bytesPerSample;

  const dataLength = audioBuffer.length * numberOfChannels * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataLength);
  const view = new DataView(buffer);

  // 写入 WAV 头部
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataLength, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, format, true);
  view.setUint16(22, numberOfChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);
  writeString(view, 36, 'data');
  view.setUint32(40, dataLength, true);

  // 写入音频数据
  const offset = 44;
  const channelData = audioBuffer.getChannelData(0);
  for (let i = 0; i < audioBuffer.length; i++) {
    const sample = Math.max(-1, Math.min(1, channelData[i]));
    view.setInt16(offset + i * 2, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
  }

  return new Blob([buffer], { type: 'audio/wav' });
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}
</script>
{% endblock %}
