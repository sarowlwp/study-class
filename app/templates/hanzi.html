{% extends "base.html" %}

{% block content %}
<div class="text-center mb-8">
    <h1 class="text-4xl font-bold text-gray-800 mb-2">欢迎来到语文学习小工具! 🎯</h1>
    <p class="text-gray-600">选择课文，开始今天的汉字学习之旅</p>
</div>

<!-- Config Card -->
<div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
    <!-- Semester Selection -->
    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">选择学期</label>
        <div id="semester-grid" class="grid grid-cols-6 gap-2">
            <!-- 由 JS 动态生成 -->
        </div>
    </div>

    <!-- Lesson Selection -->
    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">选择课文</label>
        <div id="lessons" class="grid grid-cols-2 md:grid-cols-3 gap-3">
            <p class="text-gray-400 col-span-full">请先选择学期</p>
        </div>
    </div>

    <!-- Quiz Count -->
    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">
            抽测数量: <span id="count-display" class="text-green-600 font-bold">20</span> 个
        </label>
        <input type="range" id="count" min="10" max="50" value="20"
               class="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-500">
        <div class="flex justify-between text-xs text-gray-500 mt-1">
            <span>10</span>
            <span>50</span>
        </div>
    </div>

    <!-- Start Button -->
    <button id="start-btn" disabled class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold py-4 px-8 rounded-xl text-xl shadow-lg transform transition hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
        🚀 开始抽测
    </button>
</div>

<script>
// Load semesters
async function loadSemesters() {
    const response = await fetch('/api/semesters');
    const data = await response.json();
    const grid = document.getElementById('semester-grid');

    // 分组并排序：autumn（上册）在前，spring（下册）在后；组内按 id 字母序
    const autumn = data.semesters.filter(s => s.id.includes('autumn')).sort((a, b) => a.id.localeCompare(b.id));
    const spring = data.semesters.filter(s => s.id.includes('spring')).sort((a, b) => a.id.localeCompare(b.id));
    const ordered = [...autumn, ...spring];

    ordered.forEach(s => {
        const shortName = s.name[0] + s.name[s.name.length - 1]; // e.g. "一年级上册" → "一上"
        const btn = document.createElement('button');
        btn.dataset.id = s.id;
        btn.textContent = shortName;
        btn.title = s.name; // 完整名称作为 tooltip
        btn.className = 'py-2 px-1 text-sm border border-gray-300 rounded-lg bg-white text-gray-700 hover:bg-green-50 transition';
        btn.addEventListener('click', () => selectSemester(btn, s.id));
        grid.appendChild(btn);
    });
}

function selectSemester(btn, semesterId) {
    // 清除所有按钮选中态（含语义标记类 selected）
    document.querySelectorAll('#semester-grid button').forEach(b => {
        b.classList.remove('selected', 'bg-green-500', 'text-white', 'border-green-500');
        b.classList.add('bg-white', 'text-gray-700', 'border-gray-300', 'hover:bg-green-50');
    });
    // 标记当前按钮（selected 类用于 JS 查询，Tailwind 类用于视觉）
    btn.classList.remove('bg-white', 'text-gray-700', 'border-gray-300', 'hover:bg-green-50');
    btn.classList.add('selected', 'bg-green-500', 'text-white', 'border-green-500');
    // 清空课文列表，加载新学期
    document.getElementById('lessons').innerHTML = '<p class="text-gray-400 col-span-full">请先选择学期</p>';
    loadLessons(semesterId);
}

// Load lessons
async function loadLessons(semesterId) {
    const response = await fetch(`/api/lessons?semester=${semesterId}`);
    const data = await response.json();
    const container = document.getElementById('lessons');
    container.innerHTML = '';

    data.lessons.forEach(l => {
        const div = document.createElement('div');
        div.className = 'flex items-center space-x-2 p-3 border rounded-lg hover:bg-green-50 cursor-pointer lesson-item';
        div.innerHTML = `
            <input type="checkbox" value="${l.name}" id="lesson-${l.id}" class="w-5 h-5 text-green-500 rounded focus:ring-green-500">
            <label for="lesson-${l.id}" class="flex-1 cursor-pointer text-sm">${l.name} <span class="text-xs text-gray-400">(${l.char_count}字)</span></label>
        `;
        div.querySelector('input').addEventListener('change', updateStartButton);
        container.appendChild(div);
    });
}

// Update start button state
function updateStartButton() {
    const checked = document.querySelectorAll('#lessons input:checked');
    document.getElementById('start-btn').disabled = checked.length === 0;
}

// Start quiz
async function startQuiz() {
    const semesterBtn = document.querySelector('#semester-grid button.selected');
    const semester = semesterBtn?.dataset.id ?? '';
    const lessons = Array.from(document.querySelectorAll('#lessons input:checked')).map(cb => cb.value);
    const count = parseInt(document.getElementById('count').value);

    const response = await fetch('/api/quiz/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({semester, lessons, count})
    });

    const data = await response.json();
    window.location.href = `/quiz?session=${data.session_id}`;
}

// Event listeners
document.getElementById('count').addEventListener('input', (e) => {
    document.getElementById('count-display').textContent = e.target.value;
});
document.getElementById('start-btn').addEventListener('click', startQuiz);

// Initialize
loadSemesters();
</script>
{% endblock %}
