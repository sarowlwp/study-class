version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hanzi-quiz:latest
    container_name: hanzi-quiz
    ports:
      - "8989:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/characters')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
